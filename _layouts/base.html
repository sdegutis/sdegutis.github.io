<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
  <nav>
    <a href="/">Home page</a>
  </nav>
  <h1>{{ page.title }}</h1>
  <section>
    {{ content }}
  </section>
  <section>
    <h2>All posts</h2>
    <ul>
      {% for post in site.posts %}
      <li>
        {{ post.date | date: '%Y-%m-%d' }} &mdash;
        <a href="{{ post.url }}">{{ post.title }}</a>
      </li>
      {% endfor %}
    </ul>
  </section>
  <footer>
    &copy; {{ site.time | date: '%Y' }} Steven Degutis
  </footer>
</body>

</html>
